services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  producer:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      APP_URL: http://producer:3000
    depends_on:
      rabbitmq:
        condition: service_healthy
      producer:
        condition: service_healthy

volumes:
  rabbitmq_data:
